<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>String 객체</title>
  </head>
  <body>
    <script>
      //1. length 속성
      const str = "Hello , JavaScript";
      console.log(`1.length :${str.length}`);
      // console.log("1.length:", str.loength);
      // 2. toUpperCase()toLowerCase()
      const text = "Hello";
      console.log(`2.toUppercase() :${text.toUpperCase()}`);
      console.log(`2.toLowercase() :${text.toLowerCase()}`);
      //3.inclues()
      const email = "user@example.com";
      console.log(`3.@ 포함여부 : ${email.includes("@")}`);
      //4. trim()
      const input = "  Hello";
      console.log(input.length); //6
      console.log(input.trim().length); //5 공백이있어도 삭제후 계산 단, 시작하는 부분에서만 삭제
      // 5. slice()
      const str2 = "JavaScript";
      //slice(시작인덱스(포함), 끝인텍스(미포함,바로앞까지만 자름))
      console.log(`부분 문자열 :${str2.slice(4, 10)}`);
      // 6. replace()
      const sentence = "I like Java";
      console.log(`6,answkduf rycp: ${sentence.replace("Java", "JavaScript")}`);
      //7. split()
      const data = "apple,banana,orange";
      console.log(`7.문자열 분리:${data.split("")}`);
    </script>
  </body>
</html>
